name: Gestao de Vagas Application

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Build project
        run: mvn clean install -DskipTest

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t LeonardoRocha01/gestao_vagas:latest .

      - name: Push Docker image
        run: docker push LeonardoRocha01/gestao_vagas:latest

  deploy:
    needs: build
    runs-on: self-hosted

    steps:
      - name: Pull image
        run: docker pull LeonardoRocha01/gestao_vagas:latest

      - name: Remove old container
        run: docker rm -f gestao-vagas || true

      - name: Run container
        run: |
          docker run -d -p 8080:8080 \
          -e SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }} \
          -e SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }} \
          -e SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }} \
  
         --name gestao-vagas \
          LeonardoRocha01/gestao_vagas:latest
